name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  cucumber:
    name: Cucumber E2E
    runs-on: ubuntu-latest

    env:
      CI: 'true'
      STARBUGS_BASE_URL: https://starbugs-qa.vercel.app

    defaults:
      run:
        working-directory: projects/starbugs-cucumber

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
          working-directory: projects/starbugs-cucumber

      - name: Run Cucumber scenarios
        run: bundle exec cucumber

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: starbugs-cucumber-evidence
          path: projects/starbugs-cucumber/logs
          if-no-files-found: ignore
          retention-days: 7
